<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
</head>

<body>
    <main>
        <p>
            <strong>
                Dear $email,
            </strong>
        </p>
        <p>$intro Please use the following OTP to verify your email
            address:
        </p>
        <h2>$otp</h2>
        <p>This OTP is valid for 15 minutes.</p>

        <p>
            <em>If you did not request this, please ignore this email.</em>
        </p>
        <p>Thank you!</p>
        <p>
            <strong>
                The Job Portal Team
            </strong>
        </p>
    </main>
</body>

</html>
