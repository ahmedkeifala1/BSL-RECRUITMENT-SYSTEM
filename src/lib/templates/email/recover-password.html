<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
</head>

<body>
    <main>
        <p>
            <strong>
                Dear $name,
            </strong>
        </p>
        <p>
            We received a password request for your <abbr title="Back of Sierra Leone">BSL</abbr> eRecruitment portal.
            Use the following OTP to reset your password:
        </p>
        <h2>$otp</h2>
        <p>This OTP is valid for 15 minutes.</p>

        <p>
            <em>If you did not request this, please ignore this email.</em>
        </p>
        <p>Thank you!</p>
        <p>
            <strong>
                The <abbr title="Bank of Sierra Leone">BSL</abbr> Job Portal Team
            </strong>
        </p>
    </main>
</body>

</html>
